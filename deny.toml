[graph]
targets = []

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.3.3 persists only the versioned local search index. The
    # advisory reports no vulnerability and offers no safe upgrade; corrupt
    # or incompatible indexes fail closed and are rebuilt from corpus data.
    "RUSTSEC-2025-0141",
    # ttf-parser is currently pulled through lopdf/pdf-extract; RUSTSEC marks it
    # unmaintained and states that no safe upgrade is available. Keep lopdf on
    # the fixed line for RUSTSEC-2026-0187 and track replacement upstream.
    "RUSTSEC-2026-0192",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
