rules:
  - id: paperbridge-rust-unwrap-in-production
    languages: [rust]
    severity: WARNING
    message: "Prefer explicit error handling over unwrap() in production code. Use proper error propagation or expect() with a clear message."
    patterns:
      - pattern: $X.unwrap()
      - pattern-not-inside: |
          ...
          #[cfg(test)]
          ...
      - pattern-not-inside: |
          ...
          #[test]
          ...
    metadata:
      category: reliability
      confidence: MEDIUM

  - id: paperbridge-rust-expect-empty-message
    languages: [rust]
    severity: WARNING
    message: "expect() message is empty or unhelpful. Provide a descriptive message explaining the invariant."
    patterns:
      - pattern-either:
          - pattern: $X.expect("")
          - pattern: $X.expect("expect")
          - pattern: $X.expect("should")
          - pattern: $X.expect("unreachable")
          - pattern: $X.expect("Error")
    metadata:
      category: reliability

  - id: paperbridge-rust-print-in-library
    languages: [rust]
    severity: INFO
    message: "Use tracing macros (info!, debug!, warn!, error!) instead of println! in library code."
    patterns:
      - pattern-either:
          - pattern: println!(...)
          - pattern: eprintln!(...)
          - pattern: dbg!(...)
    paths:
      exclude:
        - "src/main.rs"
        - "crates/*/src/main.rs"
        - "tests/*"
        - "src/update.rs"
    metadata:
      category: style

  - id: paperbridge-rust-panic-in-library
    languages: [rust]
    severity: WARNING
    message: "Avoid panic!() in library code. Return Result or use unreachable!() for truly impossible states."
    patterns:
      - pattern: panic!(...)
      - pattern-not-inside: |
          ...
          #[cfg(test)]
          ...
    paths:
      exclude:
        - "src/main.rs"
        - "crates/*/src/main.rs"
        - "tests/*"
    metadata:
      category: reliability

  - id: paperbridge-rust-let-underscore-ignores-error
    languages: [rust]
    severity: INFO
    message: "let _ = discards a fallible operation's error. Add a comment explaining why it's safe, or handle the Result."
    patterns:
      - pattern: let _ = $X?;
    metadata:
      category: correctness

  - id: paperbridge-rust-as-cast-truncation
    languages: [rust]
    severity: INFO
    message: "as cast may silently truncate. Use .try_into() or check bounds before casting. Ignore for widening casts (u32->usize on 64-bit)."
    patterns:
      - pattern-either:
          - pattern: $X as u32
    paths:
      exclude:
        - "tests/*"
        - "crates/paperseed/tests/*"
    metadata:
      category: correctness
